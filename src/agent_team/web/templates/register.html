{% extends "base.html" %}
{% block title %}注册 — Agent Team{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>📝 创建账号</h1>

    {% if errors %}
    <div class="alert alert-error">
        {% for error in errors %}
            <p>{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="/auth/register" class="auth-form">
        <div class="form-group">
            <label for="username">用户名</label>
            <input
                type="text"
                id="username"
                name="username"
                value="{{ username or '' }}"
                placeholder="3-50 个字符，字母数字下划线"
                required
                minlength="3"
                maxlength="50"
                pattern="[a-zA-Z0-9_-]+"
            >
        </div>

        <div class="form-group">
            <label for="email">邮箱</label>
            <input
                type="email"
                id="email"
                name="email"
                value="{{ email or '' }}"
                placeholder="your@email.com"
                required
            >
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="至少 6 位"
                required
                minlength="6"
            >
        </div>

        <button type="submit" class="btn btn-primary btn-block">注册</button>
    </form>

    <p class="auth-footer">
        已有账号？<a href="/auth/login">去登录 →</a>
    </p>
</div>
{% endblock %}
